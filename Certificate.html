  <script>
    // ===== 토큰 관리 =====
    let sessionToken = null;

    // 토큰 초기화 (서버에서 전달받은 토큰 또는 sessionStorage에서)
    function initToken() {
      // 서버에서 전달받은 토큰 (템플릿 변수)
      const serverToken = '<?!= token ?>';

      if (serverToken && serverToken !== 'undefined' && serverToken.length > 10) {
        sessionToken = serverToken;
        sessionStorage.setItem('sessionToken', serverToken);
        console.log('토큰 초기화 완료 (서버에서 전달)');
      } else {
        // sessionStorage에서 토큰 가져오기
        sessionToken = sessionStorage.getItem('sessionToken');
        console.log('토큰 초기화 완료 (sessionStorage)');
      }

      if (!sessionToken) {
        console.error('토큰 없음 - 로그인 필요');
        redirectToLogin();
      }

      return sessionToken;
    }

    // 안전한 페이지 이동 (iframe 샌드박스 호환)
    // 여러 방법을 폴백으로 시도하여 샌드박스 제약 우회
    function safeNavigate(url, params) {
      // Query string 생성
      let fullUrl = url;
      if (params) {
        const queryString = Object.keys(params)
          .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(params[key]))
          .join('&');
        fullUrl = url + '?' + queryString;
      }

      // 방법 1: window.top.location.href 시도
      try {
        window.top.location.href = fullUrl;
        return;
      } catch (e) {
        console.warn('window.top.location.href 실패, 다음 방법 시도:', e.message);
      }

      // 방법 2: window.location.replace 시도
      try {
        window.location.replace(fullUrl);
        return;
      } catch (e) {
        console.warn('window.location.replace 실패, 다음 방법 시도:', e.message);
      }

      // 방법 3: meta refresh 태그
      try {
        const meta = document.createElement('meta');
        meta.httpEquiv = 'refresh';
        meta.content = '0; url=' + fullUrl;
        document.head.appendChild(meta);
        console.log('meta refresh 태그로 리다이렉트');
      } catch (e) {
        console.error('모든 리다이렉트 방법 실패:', e.message);
        alert('페이지 이동에 실패했습니다. 수동으로 새로고침해주세요.');
      }
    }

    // 로그인 페이지로 리다이렉트
    function redirectToLogin() {
      sessionStorage.removeItem('sessionToken');
      safeNavigate('https://script.google.com/macros/s/AKfycbxpjukKc_G4SaPL52w47ANnQc8MvCmkP6IzUX8DaXBqqdz_L8Th3kLqv4_HdslfGnxIBw/exec', null);
    }

    let currentData = null;
    let currentUser = null;

    window.onload = function() {
      initToken();
      loadUserInfo();

      // 오늘 날짜 설정
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('receiptDate').value = today;
    };

    // 네비게이션 초기화 함수
    function initNavigation(currentPage, userRole) {
      const navButtons = {
        'dashboard': 'navDashboard',
        'entry': 'navEntry',
        'history': 'navHistory',
        'certificate': 'navCertificate'
      };

      if (navButtons[currentPage]) {
        const btn = document.getElementById(navButtons[currentPage]);
        if (btn) {
          btn.classList.add('active');
        }
      }

      // Item 등록 버튼은 대시보드에서만 표시
      const itemBtn = document.getElementById('navItem');
      if (itemBtn) {
        itemBtn.style.display = 'none';
      }

      // 검사결과등록 버튼은 관리자 또는 JEO만 표시
      const inspectionResultBtn = document.getElementById('navInspectionResult');
      if (inspectionResultBtn) {
        inspectionResultBtn.style.display = (userRole === '관리자' || userRole === 'JEO') ? 'inline-block' : 'none';
      }

      // 검사결과이력 버튼은 관리자 또는 JEO만 표시
      const inspectionHistoryBtn = document.getElementById('navInspectionHistory');
      if (inspectionHistoryBtn) {
        inspectionHistoryBtn.style.display = (userRole === '관리자' || userRole === 'JEO') ? 'inline-block' : 'none';
      }

      // JEO는 성적서입력, 이력관리, 확인증출력 버튼 숨김
      const entryBtn = document.getElementById('navEntry');
      if (entryBtn) {
        entryBtn.style.display = (userRole === 'JEO') ? 'none' : 'inline-block';
      }

      const historyBtn = document.getElementById('navHistory');
      if (historyBtn) {
        historyBtn.style.display = (userRole === 'JEO') ? 'none' : 'inline-block';
      }

      const certificateBtn = document.getElementById('navCertificate');
      if (certificateBtn) {
        certificateBtn.style.display = (userRole === 'JEO') ? 'none' : 'inline-block';
      }

      // 사용자 관리 버튼은 관리자만 표시
      const usersBtn = document.getElementById('navUsers');
      if (usersBtn) {
        usersBtn.style.display = (userRole === '관리자') ? 'inline-block' : 'none';
      }

      // 네비게이션 메뉴 표시 (부드러운 fade-in 효과)
      const navMenu = document.getElementById('navMenu');
      if (navMenu) {
        navMenu.style.opacity = '1';
      }
    }

    // Item 클릭 핸들러
    function handleItemClick() {
      goToPage('dashboard');
    }

    function loadUserInfo() {
      google.script.run
        .withSuccessHandler(function(response) {
          if (response.success) {
            currentUser = response.user;
            document.getElementById('userInfo').textContent =
              `${currentUser.companyName} | ${currentUser.name} (${currentUser.role})`;

            // 네비게이션 초기화
            initNavigation('certificate', currentUser.role);
          } else {
            redirectToLogin();
          }
        })
        .getCurrentUserByToken(sessionToken);
    }
    
    function generateCertificate() {
      const slipNumber = document.getElementById('slipNumber').value.trim();
      const date = document.getElementById('receiptDate').value;
      const time = document.getElementById('receiptTime').value;
      
      if (!date) {
        alert('입고일자를 선택해주세요.');
        return;
      }
      
      const container = document.getElementById('certificateContainer');
      container.innerHTML = '<div class="loading">' +
        '<div class="spinner"></div>' +
        '<p>확인증을 생성하는 중...</p>' +
      '</div>';
      
      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.success) {
            currentData = response.data;
            displayCertificate(slipNumber, date, time, currentData);
          } else {
            showEmpty('해당 날짜/시간에 등록된 데이터가 없습니다.');
          }
        })
        .withFailureHandler(function(error) {
          console.error('데이터 조회 실패:', error);
          showEmpty('데이터를 불러올 수 없습니다.');
        })
        .getDataByDateAndTime(sessionToken, date, time);
    }
    
    function displayCertificate(slipNumber, date, time, data) {
      console.log('=== displayCertificate 시작 ===');
      console.log('데이터:', data);
      
      if (!data || data.length === 0) {
        showEmpty('해당 날짜/시간에 등록된 데이터가 없습니다.');
        return;
      }
      
      // TM-NO 순으로 정렬
      data.sort(function(a, b) {
        if (a.tmNo < b.tmNo) return -1;
        if (a.tmNo > b.tmNo) return 1;
        return 0;
      });
      
      let tableRows = '';
      for (let i = 0; i < data.length; i++) {
        const item = data[i];
        // 수량에 천단위 콤마 추가
        const formattedQuantity = Number(item.quantity).toLocaleString('ko-KR');
        tableRows += '<tr>' +
          '<td>' + (i + 1) + '</td>' +
          '<td>' + item.time + '</td>' +
          '<td>' + item.tmNo + '</td>' +
          '<td>' + item.productName + '</td>' +
          '<td>' + formattedQuantity + '</td>' +
          '</tr>';
      }
      
      const today = new Date().toLocaleDateString('ko-KR', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      
      const timeDisplay = time ? time : '전체';
      const companyName = currentUser ? currentUser.companyName : '-';
      const slipNumberDisplay = slipNumber || '-';
      
      // HTML 생성 - ID 확인!
      const html =
        '<div class="certificate-preview" id="certificatePreview">' +
          '<div class="cert-header">' +
            '<div class="cert-title">검사성적서 등록 확인서</div>' +
            '<div class="cert-subtitle">Certificate of Registration</div>' +
          '</div>' +
          '<div class="cert-info">' +
            '<div class="info-row">' +
              '<div class="info-label">전표번호</div>' +
              '<div class="info-value">' + slipNumberDisplay + '</div>' +
            '</div>' +
            '<div class="info-row">' +
              '<div class="info-label">입고일자</div>' +
              '<div class="info-value">' + date + '</div>' +
            '</div>' +
            '<div class="info-row">' +
              '<div class="info-label">입고시간</div>' +
              '<div class="info-value">' + timeDisplay + '</div>' +
            '</div>' +
            '<div class="info-row">' +
              '<div class="info-label">업체명</div>' +
              '<div class="info-value">' + companyName + '</div>' +
            '</div>' +
            '<div class="info-row">' +
              '<div class="info-label">총 입고 건수</div>' +
              '<div class="info-value">' + data.length + '건</div>' +
            '</div>' +
          '</div>' +
          '<table class="cert-table">' +
            '<thead>' +
              '<tr>' +
                '<th style="width: 60px;">No.</th>' +
                '<th style="width: 100px;">입고시간</th>' +
                '<th>TM-NO</th>' +
                '<th>제품명</th>' +
                '<th style="width: 100px;">수량</th>' +
              '</tr>' +
            '</thead>' +
            '<tbody>' +
              tableRows +
            '</tbody>' +
          '</table>' +
          '<div class="cert-footer">' +
            '<div class="cert-date">' + today + '</div>' +
            '<div class="cert-company">' + companyName + '</div>' +
          '</div>' +
        '</div>';
      
      console.log('HTML 생성 완료, 길이:', html.length);
      console.log('HTML 시작 부분:', html.substring(0, 100));
      
      // HTML 삽입
      document.getElementById('certificateContainer').innerHTML = html;
      document.getElementById('btnPrint').style.display = 'inline-block';
      
      console.log('HTML 삽입 완료');
      
      // ID 확인
      setTimeout(function() {
        const preview = document.getElementById('certificatePreview');
        console.log('certificatePreview 요소:', preview);
        
        if (preview) {
          console.log('ID 확인 성공!');
          preview.scrollIntoView({ 
            behavior: 'smooth',
            block: 'start'
          });
        } else {
          console.error('ID를 찾을 수 없음!');
        }
      }, 200);
    }
    
    function showEmpty(message) {
      const container = document.getElementById('certificateContainer');
      container.innerHTML = '<div class="empty-state">' +
        '<div class="empty-icon">📭</div>' +
        '<p>' + message + '</p>' +
      '</div>';
      document.getElementById('btnPrint').style.display = 'none';
    }

    // 로그아웃
    function logout() {
      if (confirm('로그아웃 하시겠습니까?')) {
        const token = sessionStorage.getItem('sessionToken');
        google.script.run
          .withSuccessHandler(function() {
            sessionStorage.removeItem('sessionToken');
            safeNavigate('https://script.google.com/macros/s/AKfycbxpjukKc_G4SaPL52w47ANnQc8MvCmkP6IzUX8DaXBqqdz_L8Th3kLqv4_HdslfGnxIBw/exec', null);
          })
          .withFailureHandler(function(error) {
            console.error('로그아웃 실패:', error);
            sessionStorage.removeItem('sessionToken');
            safeNavigate('https://script.google.com/macros/s/AKfycbxpjukKc_G4SaPL52w47ANnQc8MvCmkP6IzUX8DaXBqqdz_L8Th3kLqv4_HdslfGnxIBw/exec', null);
          })
          .logoutWithToken(token);
      }
    }

    function goToPage(page) {
      const token = sessionStorage.getItem('sessionToken');
      const webAppUrl = '<?= getWebAppUrl() ?>';
      safeNavigate(webAppUrl, {
        'page': page,
        'token': token,
        't': Date.now()
      });
    }

    // 검사결과등록 모달 (Dashboard로 이동하면서 자동 열기)
    function showInspectionResultModal() {
      const token = sessionStorage.getItem('sessionToken');
      const webAppUrl = '<?= getWebAppUrl() ?>';
      safeNavigate(webAppUrl, {
        'page': 'dashboard',
        'token': token,
        'openInspectionModal': 'true',
        't': Date.now()
      });
    }

    function printCertificate() {
      console.log('=== printCertificate 시작 ===');
      
      // certificateContainer에서 전체 HTML 가져오기
      const container = document.getElementById('certificateContainer');
      
      if (!container) {
        alert('확인증 컨테이너를 찾을 수 없습니다.');
        return;
      }
      
      const certificateHTML = container.innerHTML;
      console.log('HTML 길이:', certificateHTML.length);
      
      if (!certificateHTML || certificateHTML.trim() === '') {
        alert('확인증을 먼저 생성해주세요.');
        return;
      }
      
      // 새 창으로 인쇄
      const printWindow = window.open('', '_blank', 'width=800,height=600');
      
      if (!printWindow) {
        alert('팝업이 차단되었습니다. 팝업을 허용해주세요.');
        return;
      }
      
      printWindow.document.write('<!DOCTYPE html>');
      printWindow.document.write('<html><head>');
      printWindow.document.write('<meta charset="UTF-8">');
      printWindow.document.write('<title>확인증 인쇄</title>');
      printWindow.document.write('<style>');
      printWindow.document.write('@page { size: A4; margin: 15mm; }');
      printWindow.document.write('* { box-sizing: border-box; }');
      printWindow.document.write('body { font-family: "Segoe UI", "Malgun Gothic", sans-serif; margin: 20px; padding: 0; }');
      printWindow.document.write('.certificate-preview { border: 2px solid #333; padding: 40px; background: white; }');
      printWindow.document.write('.cert-header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 3px double #333; }');
      printWindow.document.write('.cert-title { font-size: 32px; font-weight: bold; margin-bottom: 10px; color: #000; }');
      printWindow.document.write('.cert-subtitle { font-size: 18px; color: #666; }');
      printWindow.document.write('.cert-info { margin-bottom: 30px; }');
      printWindow.document.write('.info-row { display: flex; padding: 10px; border-bottom: 1px solid #eee; }');
      printWindow.document.write('.info-label { width: 150px; font-weight: bold; color: #333; }');
      printWindow.document.write('.info-value { flex: 1; color: #666; }');
      printWindow.document.write('.cert-table { width: 100%; border-collapse: collapse; margin-top: 20px; }');
      printWindow.document.write('.cert-table th, .cert-table td { border: 1px solid #333; padding: 12px; text-align: center; color: #000; }');
      printWindow.document.write('.cert-table th { background-color: #f5f5f5; font-weight: bold; }');
      printWindow.document.write('.cert-footer { margin-top: 40px; text-align: right; }');
      printWindow.document.write('.cert-date { font-size: 18px; margin-bottom: 20px; color: #000; }');
      printWindow.document.write('.cert-company { font-size: 20px; font-weight: bold; color: #000; }');
      printWindow.document.write('</style>');
      printWindow.document.write('</head><body>');
      printWindow.document.write(certificateHTML);
      printWindow.document.write('</body></html>');
      printWindow.document.close();
      
      console.log('새 창에 HTML 작성 완료');

      // 로딩 후 인쇄
      setTimeout(function() {
        printWindow.focus();
        printWindow.print();
        console.log('인쇄 다이얼로그 열림');

        // 인쇄 완료 또는 취소 후 창 닫기 (선택사항)
        // printWindow.close(); // 필요시 주석 제거
      }, 500);
    }

  </script>
